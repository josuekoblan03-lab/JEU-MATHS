<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MathQuest — Résultats de la partie. Découvrez le gagnant !">
  <title>MathQuest — Résultats</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/style.css?v=2.0">
</head>
<body>
  <!-- Confetti container -->
  <div class="confetti-container" id="confetti-container"></div>

  <div class="page">
    <!-- Winner Text 3D -->
    <p class="winner-text" id="winner-text">VICTOIRE !</p>
    <p class="section-title mt-2" id="winner-name">—</p>

    <!-- Podium -->
    <div class="podium" id="podium">
      <!-- 2nd place -->
      <div class="podium-place second" id="podium-2" style="animation-delay:.3s;">
        <p class="podium-rank">2</p>
        <p class="podium-name" id="podium-name-2">—</p>
        <p class="podium-points" id="podium-score-2">0 pts</p>
      </div>
      <!-- 1st place -->
      <div class="podium-place first" id="podium-1" style="animation-delay:.1s;">
        <p class="podium-rank">👑</p>
        <p class="podium-name" id="podium-name-1">—</p>
        <p class="podium-points" id="podium-score-1">0 pts</p>
      </div>
      <!-- 3rd place -->
      <div class="podium-place third" id="podium-3" style="animation-delay:.5s;">
        <p class="podium-rank">3</p>
        <p class="podium-name" id="podium-name-3">—</p>
        <p class="podium-points" id="podium-score-3">0 pts</p>
      </div>
    </div>

    <!-- Solo Result -->
    <div id="solo-result" class="hidden mt-4 mb-4 card-3d" style="text-align:center; padding: 2rem; border: 2px solid var(--gold); background: rgba(0,0,0,0.4);">
      <p style="font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--gold); margin: 0; text-shadow: 0 0 10px var(--gold);" id="solo-score-display">0 / 10</p>
      <p style="font-size: 1rem; color: var(--text-muted); margin-top: 10px;" id="solo-feedback-display">Bonnes réponses</p>
    </div>

    <!-- Other Players -->
    <div class="player-list mt-3" id="other-players" style="max-width:400px;"></div>

    <!-- Actions -->
    <div class="gap-row mt-4">
      <button class="btn-3d accent" id="btn-replay" onclick="playAgain()">🔄 Rejouer</button>
      <button class="btn-3d primary" onclick="window.location.href='/'">🏠 Accueil</button>
    </div>
  </div>

  <!-- Audio Mute Button -->
  <button id="mute-btn" class="mute-btn" onclick="toggleMute()">🔊</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/static/js/audio.js"></script>
  <script>
    const ROOM_CODE = "{{ room_code }}";
  </script>
  <script src="/static/js/result.js"></script>
</body>
</html>
