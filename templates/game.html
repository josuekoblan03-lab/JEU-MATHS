<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MathQuest — Partie en cours. Répondez le plus vite possible !">
  <title>MathQuest — Jeu en Cours</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/style.css?v=2.0">
</head>
<body>
  <div class="page" style="justify-content:flex-start;padding-top:40px;">
    <!-- Bouton Quitter -->
    <button class="btn-3d" style="position: absolute; top: 20px; right: 20px; background:var(--danger); font-size: 0.75rem; padding: 8px 16px; z-index: 50;" onclick="window.location.href='/'">🚪 Quitter</button>

    <div class="game-layout">
      <!-- Main Game Area -->
      <div class="game-main">
        <!-- Question Card with 3D tilt -->
        <div class="card-3d card-question" id="question-card">
          <p class="question-label" id="question-label">Question #1</p>
          <div class="card-flip">
            <div class="card-flip-inner" id="card-inner">
              <div class="card-flip-front">
                <p class="question-text" id="question-text">En attente...</p>
              </div>
              <div class="card-flip-back">
                <p class="question-text text-accent" id="answer-reveal" style="font-size:2rem;">—</p>
              </div>
            </div>
          </div>
          <!-- SOLO TIMER BAR -->
          <div class="timer-container hidden" id="solo-timer">
            <div class="timer-bar" id="timer-bar"></div>
          </div>
        </div>

        <!-- Answer Input -->
        <div style="width:100%;max-width:400px;text-align:center;">
          <input type="number" class="input-3d" id="answer-input" placeholder="?" style="font-size:2rem;letter-spacing:4px;" disabled inputmode="none">
          
          <!-- Virtual Keypad (visible on mobile/small screens) -->
          <div class="numeric-keypad mt-3" id="numeric-keypad">
            <button class="key-3d" onclick="keypadType('1')">1</button>
            <button class="key-3d" onclick="keypadType('2')">2</button>
            <button class="key-3d" onclick="keypadType('3')">3</button>
            <button class="key-3d" onclick="keypadType('4')">4</button>
            <button class="key-3d" onclick="keypadType('5')">5</button>
            <button class="key-3d" onclick="keypadType('6')">6</button>
            <button class="key-3d" onclick="keypadType('7')">7</button>
            <button class="key-3d" onclick="keypadType('8')">8</button>
            <button class="key-3d" onclick="keypadType('9')">9</button>
            <button class="key-3d danger" onclick="keypadClear()">⌫</button>
            <button class="key-3d" onclick="keypadType('0')">0</button>
            <button class="key-3d success" id="btn-keypad-submit" onclick="submitAnswer()">✓</button>
          </div>

          <button class="btn-3d primary mt-3" id="btn-submit" onclick="submitAnswer()" disabled>
            ✓ Soumettre
          </button>
        </div>

        <!-- Feedback -->
        <div id="feedback" class="hidden"></div>
      </div>

      <!-- Sidebar: Players + Scores -->
      <div class="game-sidebar">
        <p class="section-title">Scores</p>
        <div class="player-list" id="player-scores">
          <!-- Injected by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Audio Mute Button -->
  <button id="mute-btn" class="mute-btn" onclick="toggleMute()">🔊</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/static/js/audio.js?v=3.0"></script>
  <script>
    const ROOM_CODE = "{{ room_code }}";
  </script>
  <script src="/static/js/game.js?v=4.0"></script>
</body>
</html>
